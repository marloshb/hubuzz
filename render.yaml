services:
  - type: web
    name: hubuzz
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --timeout 120 --workers 2
    healthCheckPath: /api/health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12.4"

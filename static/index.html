<style>:root{--canvas:#f4f6fb;--surface:#fff;--surface2:#f8fafc;--line:#e6eaf2;--line2:#eef1f7;--ink:#0f1b34;--ink2:#46546f;--ink3:#8a96ac;--primary:#1b3a8f;--primary2:#2f5bd6;--psoft:#eaf0ff;--green:#13a36b;--gsoft:#e3f7ee;--orange:#e8801f;--osoft:#fdeede;--purple:#7c4dd0;--pusoft:#f0e9fb;--red:#dc3a4b;--rsoft:#fde6e8;--cyan:#0fa3b1;--csoft:#e0f6f8;--radius:14px;--sh-sm:0 1px 3px rgba(15,27,52,.07);--sh:0 6px 22px rgba(15,27,52,.08);--sh-lg:0 18px 50px rgba(15,27,52,.16);--sb:264px;--tb:66px;font-family:'Inter',system-ui,Segoe UI,sans-serif}

 const rules=[['Confianca minima por etapa','0.70 classif. / 0.60 captura'],['Escalonar a humano se','score limitrofe ou requisito ambiguo'],['Revisao obrigatoria','toda oportunidade ALTA'],['Deduplicacao','hash titulo + instituicao + prazo'],['Reprocessamento','automatico em falha (ate 3x)']].map(r=>`<div class="kv2"><span>${E(r[0])}</span><span>${E(r[1])}</span></div>`).join('');
 return ph('Orquestracao','Como o orquestrador coordena os agentes, aplica regras de confianca e decide quando acionar a supervisao humana (human-in-the-loop).')
 +board+`<div class="split mt"><div>${card('Log de eventos do orquestrador (ao vivo)',logs,`<span class="bg b-green"><span class="dot d-live"></span>streaming</span>`)}</div>
 <div>${card('Politicas de decisao',rules)}<div class="mt">${card('Saude dos agentes',`<div class="chart sm"><canvas id="cAcc"></canvas></div>`)}</div></div></div>`;

 <div class="mt">${card('Parametros do pipeline de IA',`<div class="kv2"><span>Frequencia de captura</span><span>A cada 15 minutos</span></div><div class="kv2"><span>Threshold de aderencia</span><span>70 / 100</span></div><div class="kv2"><span>Confianca minima global</span><span>0,70</span></div><div class="kv2"><span>Human-in-the-loop</span><span>Ativado (prio. alta)</span></div><div class="kv2"><span>Taxonomia</span><span>Institucional v3.2</span></div><div class="kv2"><span>Idiomas suportados</span><span>PT / EN / ES</span></div>`)}</div></div>
 <div class="side"><h4>Notificacoes</h4>${card('Canais',`<div class="kv2"><span>E-mail (prazos criticos)</span><span>Ativo</span></div><div class="kv2"><span>Resumo diario</span><span>09:00</span></div><div class="kv2"><span>Slack / Teams</span><span>Conectado</span></div><div class="kv2"><span>Alertas de falha de fonte</span><span>Ativo</span></div>`)}
 <div class="mt">${card('Sobre',`<p class="muted sm">Hub de Oportunidades Institucionais &middot; v1.0<br>Pipeline de 8 agentes de IA orquestrados.<br>Dados ilustrativos para demonstracao.</p>`)}</div></div></div>`;

/* ====================== PAGINA: BUSCA DOU (com range de datas) ====================== */
const KW_STORE='hub_keywords';
const KW_DEFAULT=['geoprocessamento','mapeamento','plataforma','sensoriamento','imageamento','sistemas'];
function kwGet(){try{const v=JSON.parse(localStorage.getItem(KW_STORE));return Array.isArray(v)&&v.length?v:KW_DEFAULT.slice();}catch(_){return KW_DEFAULT.slice();}}
function kwSet(a){localStorage.setItem(KW_STORE,JSON.stringify(a));}
function kwAdd(){const i=document.getElementById('kwInput');const t=(i.value||'').trim();if(!t)return;const a=kwGet();if(!a.map(x=>x.toLowerCase()).includes(t.toLowerCase())){a.push(t);kwSet(a);}i.value='';render('keywords');}
function kwDel(t){kwSet(kwGet().filter(x=>x!==t));render('keywords');}
function kwReset(){kwSet(KW_DEFAULT.slice());render('keywords');}
function isoToday(){const d=new Date();return d.toISOString().slice(0,10);}
function isoDaysAgo(n){const d=new Date();d.setDate(d.getDate()-n);return d.toISOString().slice(0,10);}
function pgKeywords(){
 const kws=kwGet();
 const chips=kws.map(t=>`<span class="kwchip">${E(t)}<button title="remover" onclick="kwDel('${t.replace(/'/g,"\\'")}')">&times;</button></span>`).join('')||'<span class="muted">Nenhuma palavra-chave cadastrada.</span>';
 const k=`<div class="grid g4">
  ${kpi({ic:'\u{1F511}',v:kws.length,l:'Palavras-chave ativas',c:'#2f5bd6',s:'#eaf0ff'})}
  ${kpi({ic:'\u{1F4C5}',v:'Range',l:'Busca por periodo de datas',c:'#0fa3b1',s:'#e0f6f8'})}
  ${kpi({ic:'\u{1F916}',v:'DOU',l:'Consulta real (leiturajornal)',c:'#7c4dd0',s:'#f0e9fb'})}
  ${kpi({ic:'\u{1F50D}',v:'JSON',l:'Conta ocorrencias reais',c:'#13a36b',s:'#e3f7ee'})}</div>`;
 const editor=card('Parametros da busca',
   `<p class="muted" style="margin-bottom:12px">Defina as palavras-chave e o <b>intervalo de datas</b>. O agente varre cada dia util do periodo na secao escolhida.</p>
    <div style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px">${chips}</div>
    <div style="display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end">
      <div><label class="flbl">Nova palavra-chave</label><input id="kwInput" placeholder="ex.: cartografia" style="padding:11px 13px;border:1px solid var(--line);border-radius:10px;font-family:inherit;width:220px" onkeydown="if(event.key==='Enter')kwAdd()"></div>
      <button class="btn btn-sm" onclick="kwAdd()" style="height:42px">+ Adicionar</button>
    </div>
    <div style="display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end;margin-top:14px">
      <div><label class="flbl">Data inicial</label><input type="date" id="kwDe" value="${isoDaysAgo(7)}" max="${isoToday()}" style="padding:10px;border:1px solid var(--line);border-radius:10px;font-family:inherit"></div>
      <div><label class="flbl">Data final</label><input type="date" id="kwAte" value="${isoToday()}" max="${isoToday()}" style="padding:10px;border:1px solid var(--line);border-radius:10px;font-family:inherit"></div>
      <div><label class="flbl">Secao</label><select id="kwSecao" style="padding:11px;border:1px solid var(--line);border-radius:10px;font-family:inherit">
        <option value="do1">Secao 1 - Atos normativos</option>
        <option value="do2">Secao 2 - Pessoal</option>
        <option value="do3" selected>Secao 3 - Contratos e editais</option></select></div>
      <button class="btn btn-p" id="kwRun" onclick="kwBuscar()" style="height:42px">\u{1F50E} Buscar no periodo</button>
      <button class="btn btn-sm" onclick="kwReset()" style="height:42px">Restaurar termos</button>
    </div>
    <div class="quickr" style="margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
      <span class="muted sm">Atalhos:</span>
      <button class="btn btn-sm" onclick="kwQuick(0)">Hoje</button>
      <button class="btn btn-sm" onclick="kwQuick(7)">Ultimos 7 dias</button>
      <button class="btn btn-sm" onclick="kwQuick(15)">Ultimos 15 dias</button>
      <button class="btn btn-sm" onclick="kwQuick(30)">Ultimos 30 dias</button>
    </div>`);
 const runner=card('Resultados','<div id="kwOut"><div class="muted">Defina o periodo e clique em <b>Buscar no periodo</b>.</div></div>');
 return ph('Busca DOU por periodo','Consulta real ao Diario Oficial da Uniao (leiturajornal). Varre cada dia util do intervalo e soma as ocorrencias por palavra-chave.')
   +k+`<div class="mt">${editor}</div><div class="mt">${runner}</div>`;
}
function kwQuick(n){document.getElementById('kwDe').value=n===0?isoToday():isoDaysAgo(n);document.getElementById('kwAte').value=isoToday();}
function fmtBR(iso){const p=iso.split('-');return p[2]+'-'+p[1]+'-'+p[0];}
async function kwBuscar(){
 const btn=document.getElementById('kwRun'), out=document.getElementById('kwOut');
 const kws=kwGet(); const secao=(document.getElementById('kwSecao')||{}).value||'do3';
 const de=document.getElementById('kwDe').value, ate=document.getElementById('kwAte').value;
 if(!kws.length){out.innerHTML=alertBox('warn','Atencao','Cadastre ao menos uma palavra-chave.');return;}
 if(!de||!ate){out.innerHTML=alertBox('warn','Atencao','Informe data inicial e final.');return;}
 if(de>ate){out.innerHTML=alertBox('warn','Datas invalidas','A data inicial nao pode ser maior que a final.');return;}
 btn.disabled=true; btn.textContent='Buscando...';
 out.innerHTML='<div class="muted">Varrendo o DOU de <b>'+fmtBR(de)+'</b> a <b>'+fmtBR(ate)+'</b> (dias uteis)... Isso pode levar alguns segundos por dia.</div>';
 try{
   const r=await fetch('/api/dou/buscar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords:kws,secao:secao,date_from:de,date_to:ate})});
   const raw=await r.text(); let d;
   try{d=JSON.parse(raw);}catch(_){out.innerHTML=alertBox('err','Backend offline','A API nao respondeu em JSON. Abra o hub pela URL publica (onrender.com), nao pelo arquivo local.');return;}
   if(!d.ok){out.innerHTML=alertBox('warn','Falha na busca',d.error||'erro');return;}
   const c=d.consulta;
   let h='<div class="muted sm" style="margin-bottom:10px">Periodo: <b>'+E(fmtBR(c.date_from))+'</b> a <b>'+E(fmtBR(c.date_to))+'</b> &middot; '+c.dias_uteis+' dia(s) util(eis) com edicao &middot; '+c.materias_varridas+' materias varridas no total &middot; secao '+E(c.secao.toUpperCase())+'</div>';
   if(c.dias_pulados&&c.dias_pulados.length) h+='<div class="muted sm" style="margin-bottom:8px">Dias sem edicao/pulados: '+c.dias_pulados.map(fmtBR).join(', ')+'</div>';
   h+=d.resultados.map(it=>{
     const cls=it.encontrou?'ok':'info', icon=it.encontrou?'\u2714':'\u2139';
     let mats='';
     (it.materias||[]).slice(0,8).forEach(m=>{mats+='<div style="margin-top:6px"><a href="'+(m.link||'#')+'" target="_blank">'+E(m.titulo||'(sem titulo)')+'</a><div class="muted sm">'+E(m.data_pub||'')+(m.orgao?(' &middot; '+E(m.orgao)):'')+(m.pagina?(' &middot; p.'+E(''+m.pagina)):'')+'</div></div>';});
     return `<div class="alert ${cls}"><div class="ic">${icon}</div><div style="flex:1"><b>${E(it.termo)}</b> <span class="muted sm">&middot; ${it.total} ocorrencia(s) no periodo</span>${mats||'<p class="muted sm">Sem ocorrencias no periodo.</p>'}${it.total>8?('<p class="muted sm" style="margin-top:6px">+ '+(it.total-8)+' outras...</p>'):''}</div></div>`;
   }).join('');
   h+='<p class="muted sm" style="margin-top:10px">'+E(d.nota||'')+'</p>';
   out.innerHTML=h;
 }catch(e){out.innerHTML=alertBox('err','Erro de rede',String(e));}
 finally{btn.disabled=false; btn.textContent='\u{1F50E} Buscar no periodo';}
}
function alertBox(t,title,msg){const c={ok:['#e3f7ee','#13a36b','\u2714'],warn:['#fdeede','#e8801f','\u26A0'],err:['#fde6e8','#dc3a4b','\u2716'],info:['#eef1f6','#5b6677','\u2139']}[t]||['#eef1f6','#5b6677','\u2139'];return `<div class="alert"><div class="ic" style="background:${c[0]};color:${c[1]}">${c[2]}</div><div><b>${title}</b><p>${msg}</p></div></div>`;}

function render(route){
 clearCharts();
 const seg=route.split('/'); let html='';
 switch(seg[0]){
  case 'dashboard':html=pgDashboard();break;
  case 'oportunidades':html=pgOportunidades();break;
  case 'op':html=pgOp(seg[1]);break;
  case 'pipeline':html=pgPipeline();break;
  case 'agentes':html=pgAgentes();break;
  case 'orquestracao':html=pgOrquestracao();break;
  case 'keywords':html=pgKeywords();break;
  case 'fontes':html=pgFontes();break;
  case 'analytics':html=pgAnalytics();break;
  case 'config':html=pgConfig();break;
  default:html=pgDashboard();route='dashboard';
 }
 document.getElementById('view').innerHTML=html;
 renderNav(route);
 document.getElementById('sidebar').classList.remove('open');
 window.scrollTo(0,0);
 setTimeout(()=>mkCharts(seg[0]),30);
}
function go(route){location.hash=route;}
function filterOps(el,cat){
 document.querySelectorAll('.filters .fc').forEach(x=>x.classList.remove('on'));el.classList.add('on');
 const list=cat==='Todas'?OPS:OPS.filter(o=>o.or===cat);
 document.getElementById('opsList').innerHTML=list.length?list.map(oppCard).join(''):'<div class="muted center" style="padding:30px">Nenhuma oportunidade nesta categoria.</div>';
}
window.addEventListener('hashchange',()=>render(location.hash.replace('#','')||'dashboard'));
document.addEventListener('DOMContentLoaded',()=>render(location.hash.replace('#','')||'dashboard'));
</script>

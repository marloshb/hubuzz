<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>Hub de Oportunidades</title>
<style>
  :root{--bg:#0f172a;--card:#1e293b;--accent:#38bdf8;--txt:#e2e8f0;--muted:#94a3b8}
  *{box-sizing:border-box;margin:0;padding:0;font-family:system-ui,Segoe UI,Roboto,sans-serif}
  body{background:var(--bg);color:var(--txt);min-height:100vh}
  header{padding:24px 32px;border-bottom:1px solid #334155;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
  header h1{font-size:22px}
  header a{color:var(--bg);background:var(--accent);padding:10px 16px;border-radius:8px;text-decoration:none;font-weight:600}
  main{padding:32px;max-width:1100px;margin:0 auto}
  .controls{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:24px}
  input,select,button{padding:12px 14px;border-radius:8px;border:1px solid #334155;background:var(--card);color:var(--txt);font-size:14px}
  button{background:var(--accent);color:var(--bg);font-weight:700;cursor:pointer;border:none}
  button:hover{opacity:.9}
  .grid{display:grid;gap:16px;grid-template-columns:repeat(auto-fill,minmax(300px,1fr))}
  .card{background:var(--card);padding:20px;border-radius:12px;border:1px solid #334155}
  .card h3{font-size:16px;margin-bottom:8px;color:var(--accent)}
  .card small{color:var(--muted)}
  .status{margin:16px 0;color:var(--muted);font-size:14px}
  .tag{display:inline-block;background:#0ea5e922;color:var(--accent);padding:2px 10px;border-radius:999px;font-size:12px;margin-top:8px}
</style>
</head>
<body>
<header>
  <h1>📊 Hub de Oportunidades Institucionais</h1>
  <a href="/agente">🤖 Abrir Agente DOU</a>
</header>
<main>
  <div class="controls">
    <input id="kw" type="text" placeholder="Palavras-chave (ex: edital, fomento)" style="flex:1;min-width:220px"/>
    <select id="dias">
      <option value="7">Últimos 7 dias</option>
      <option value="15">Últimos 15 dias</option>
      <option value="30">Últimos 30 dias</option>
    </select>
    <button onclick="buscar()">Buscar Oportunidades Reais (DOU)</button>
  </div>
  <div class="status" id="status">Digite palavras-chave e busque publicações reais do Diário Oficial da União.</div>
  <div class="grid" id="grid"></div>
</main>
<script>
async function buscar(){
  const kw = document.getElementById('kw').value.split(',').map(s=>s.trim()).filter(Boolean);
  const dias = document.getElementById('dias').value;
  const status = document.getElementById('status');
  const grid = document.getElementById('grid');
  grid.innerHTML=''; 
  if(!kw.length){status.textContent='Informe ao menos uma palavra-chave.';return;}
  status.textContent='Consultando o DOU...';
  try{
    const r = await fetch('/api/dou/buscar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords:kw,dias:Number(dias)})});
    const data = await r.json();
    if(!r.ok){status.textContent=data.error||'Erro na consulta.';return;}
    status.textContent=`Período ${data.consulta.periodo[0]} a ${data.consulta.periodo[1]} — ${data.resultados.length} termo(s) consultado(s).`;
    data.resultados.forEach(res=>{
      const c=document.createElement('div');c.className='card';
      c.innerHTML=`<h3>${res.termo}</h3>
        <small>Status: ${res.status} • ${res.tamanho_resposta} bytes</small>
        <div><a href="${res.fonte}" target="_blank" style="color:var(--accent)">Ver no DOU ↗</a></div>
        <span class="tag">Fonte real</span>`;
      grid.appendChild(c);
    });
    data.erros.forEach(e=>{
      const c=document.createElement('div');c.className='card';
      c.innerHTML=`<h3 style="color:#f87171">Erro</h3><small>${e}</small>`;
      grid.appendChild(c);
    });
  }catch(e){status.textContent='Falha de conexão: '+e.message;}
}
</script>
</body>
</html>

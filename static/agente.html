<!DOCTYPE html>
<html lang="pt-BR"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Agente DOU</title>
<style>
 body{font-family:system-ui,Arial,sans-serif;max-width:760px;margin:40px auto;padding:0 16px;color:#1f2937}
 h1{font-size:1.6rem} input,button{font-size:1rem;padding:10px 12px;border-radius:8px;border:1px solid #cbd5e1}
 button{background:#4f46e5;color:#fff;border:0;cursor:pointer}
 pre{background:#0f172a;color:#e2e8f0;padding:14px;border-radius:8px;overflow:auto}
</style></head><body>
<h1>Agente DOU</h1>
<p>Busca publicacoes no Diario Oficial da Uniao por palavras-chave.</p>
<input id="kw" placeholder="ex.: licitacao, edital, concurso" style="width:100%">
<div style="margin:12px 0"><button onclick="buscar()">Buscar no DOU</button></div>
<pre id="out">Resultados aparecerao aqui...</pre>
<script>
async function buscar(){
  const kws=document.getElementById('kw').value.split(',').map(s=>s.trim()).filter(Boolean);
  document.getElementById('out').textContent='Buscando...';
  try{
    const r=await fetch('/api/dou/buscar',{method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({keywords:kws,secao:'do1',dias:7})});
    document.getElementById('out').textContent=JSON.stringify(await r.json(),null,2);
  }catch(e){document.getElementById('out').textContent='Erro: '+e}
}
</script>
</body></html>

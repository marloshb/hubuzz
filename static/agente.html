<!DOCTYPE html><html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Agente DOU</title><style>body{font-family:system-ui,Arial,sans-serif;max-width:820px;margin:40px auto;padding:0 16px;color:#1f2937}input,button,select{font-size:1rem;padding:10px 12px;border-radius:8px;border:1px solid #cbd5e1}button{background:#4f46e5;color:#fff;border:0;cursor:pointer;font-weight:600}button:disabled{opacity:.6}.row{display:flex;gap:8px;flex-wrap:wrap;align-items:flex-end;margin:12px 0}.card{border:1px solid #e2e8f0;border-radius:10px;padding:14px;margin-top:10px}.ok{border-left:4px solid #16a34a}.warn{border-left:4px solid #f59e0b}.err{border-left:4px solid #dc2626}a{color:#4f46e5}small{color:#64748b}label{font-size:12px;color:#64748b;display:block;margin-bottom:3px}</style></head><body><h1>Agente DOU</h1><p>Busca por palavras-chave no Diario Oficial da Uniao, com intervalo de datas.</p><input id="kw" placeholder="ex.: geoprocessamento, mapeamento, sistemas" style="width:100%"><div class="row"><div><label>De</label><input type="date" id="de"></div><div><label>Ate</label><input type="date" id="ate"></div><div><label>Secao</label><select id="sec"><option value="do1">Secao 1</option><option value="do2">Secao 2</option><option value="do3" selected>Secao 3</option></select></div><button id="btn" onclick="buscar()">Buscar</button></div><div id="out"></div><script>
const t=new Date().toISOString().slice(0,10);const a=new Date();a.setDate(a.getDate()-7);document.getElementById('ate').value=t;document.getElementById('de').value=a.toISOString().slice(0,10);
function br(iso){const p=iso.split('-');return p[2]+'-'+p[1]+'-'+p[0];}
async function buscar(){const btn=document.getElementById('btn'),out=document.getElementById('out');const kws=document.getElementById('kw').value.split(',').map(s=>s.trim()).filter(Boolean);if(!kws.length){out.innerHTML='<div class="card warn">Digite uma palavra-chave.</div>';return;}const de=document.getElementById('de').value,ate=document.getElementById('ate').value,sec=document.getElementById('sec').value;btn.disabled=true;btn.textContent='Buscando...';out.innerHTML='<div class="card">Varrendo o periodo...</div>';try{const r=await fetch('/api/dou/buscar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({keywords:kws,secao:sec,date_from:de,date_to:ate})});const raw=await r.text();let d;try{d=JSON.parse(raw);}catch(_){out.innerHTML='<div class="card err">Backend offline. Abra pela URL do Render.</div>';return;}if(!d.ok){out.innerHTML='<div class="card warn">'+(d.error||'Erro')+'</div>';return;}const c=d.consulta;let h='<div class="card ok"><b>'+br(c.date_from)+' a '+br(c.date_to)+'</b> &middot; '+c.dias_uteis+' dia(s) util(eis) &middot; '+c.materias_varridas+' materias</div>';d.resultados.forEach(it=>{h+='<div class="card '+(it.encontrou?'ok':'')+'"><b>'+it.termo+'</b> &middot; '+it.total+' ocorrencia(s)';(it.materias||[]).slice(0,8).forEach(m=>{h+='<br><a href="'+m.link+'" target="_blank">'+(m.titulo||'(sem titulo)')+'</a> <small>'+(m.data_pub||'')+' '+(m.orgao||'')+'</small>';});h+='</div>';});out.innerHTML=h;}catch(e){out.innerHTML='<div class="card err">Erro: '+e+'</div>';}finally{btn.disabled=false;btn.textContent='Buscar';}}
</script></body></html>
